version: "3.8"

services:
  # ── Local PostgreSQL (replaces Supabase for local dev) ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: melodi
      POSTGRES_PASSWORD: melodi_dev
      POSTGRES_DB: melodi
    volumes:
      - melodi_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodi"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Local Supabase-compatible REST API (PostgREST) ──
  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://melodi:melodi_dev@db:5432/melodi
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: melodi
      PGRST_JWT_SECRET: super-secret-jwt-token-for-local-dev-only-32chars!!
    depends_on:
      db:
        condition: service_healthy

volumes:
  melodi_pgdata:
    driver: local
